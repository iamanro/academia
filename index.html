    <script>
      // Nastaví motiv před prvním vykreslením (zabrání probliknutí).
      (function () {
        try {
          var pref = localStorage.getItem('academia-theme') || 'system';
          var dark =
            pref === 'dark' ||
            (pref === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
